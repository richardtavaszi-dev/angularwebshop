<div class="container mt-4" *ngIf="product.name">
  <div class="card shadow" [ngClass]="(product.quantity ?? 0) < 10 ? 'border-danger' : 'border-light'">
    
    <div class="card-header" [ngClass]="(product.quantity ?? 0) < 10 ? 'bg-danger text-white' : ''">
      {{ product.name }}
    </div>

    <div class="card-body">
      <h5 class="card-title">Ár: {{ product.price ?? 0 }} Ft</h5>
      <p class="card-text">
        <strong>Készlet: {{ product.quantity ?? 0 }} db</strong>
      </p>

      <p class="text-danger fw-bold" *ngIf="(product.quantity ?? 0) < 10">
        ⚠️ ALACSONY KÉSZLET!
      </p>
    </div>
  </div>
</div>

    <div class="card-footer bg-transparent border-0">
      <button class="btn btn-primary" (click)="addToCart()">
        🛒 Kosárba tesz
      </button>
      <a routerLink="/list" class="btn btn-warning ms-2">Vissza a termékekhez</a>
    </div>
